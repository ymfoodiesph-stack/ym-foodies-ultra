<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YM Foodies Ultra</title>

  <!-- Favicon -->
  <link rel="icon" href="assets/logo.png" type="image/png">

  <!-- Shared Styles -->

  <!-- Page-specific styles -->
  <!-- index.html usually uses shared styles only -->

<body>

  <!-- Header -->
  <header>
    <div class="logo">
      <img src="assets/logo.png" alt="YM Foodies Logo" width="120">
