<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | YM Foodies</title>
  <link rel="stylesheet" href="css/style.css"> <!-- optional external CSS -->
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #fff5f0;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      flex-direction: column;
    }
    h1 {
      font-size: 8rem;
      margin: 0;
      color: #ff6b3c;
    }
    h2 {
      font-size: 2rem;
      margin: 10px 0;
    }
    p {
      font-size: 1.2rem;
      margin: 20px 0;
      max-width: 400px;
    }
    a {
      display: inline-block;
      padding: 12px 30px;
      background-color: #ff6b3c;
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
      transition: 0.3s;
    }
    a:hover {
      background-color: #ff3b0f;
    }
    img {
      max-width: 250px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <img src="assets/404-food.png" alt="Lost food illustration">
  <h1>404</h1>
  <h2>Oops! Page Not Found</h2>
  <p>Looks like the food you’re looking for got lost in the kitchen. Don’t worry, we’ll help you get back on track!</p>
  <a href="index.html">Go Back Home</a>
</body>
</html>
